# /etc/nginx/sites-available/medisync 에 복사 후 사이트 활성화:
#   sudo ln -s /etc/nginx/sites-available/medisync /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# 그 다음 certbot 으로 HTTPS 자동 설정:
#   sudo certbot --nginx -d your-domain.com -d www.your-domain.com

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    client_max_body_size 10M;

    # 프런트 정적 파일 (npm run build 결과물)
    root /home/ubuntu/pharma-project/frontend/dist;
    index index.html;

    # API + Auth + WebSocket 만 백엔드로 프록시
    location ~ ^/(api|auth)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 그 외 모든 경로는 SPA — index.html 로 fallback
    location / {
        try_files $uri /index.html;
    }
}
